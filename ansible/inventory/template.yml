# Template for dynamic inventory generation
# Usage: terraform output -json ansible_inventory > ansible/inventory/generated.yml
---
webservers:
  hosts:
    web:
      ansible_host: "{{ ansible_host }}"
      ansible_user: ec2-user
      ansible_connection: ssm
      ansible_ssh_common_args: "-o StrictHostKeyChecking=no"
      ansible_python_interpreter: /usr/bin/python3
  vars:
    project_name: deskto-website
    region: ap-south-1
    ecr_repo_url: 898322960338.dkr.ecr.ap-south-1.amazonaws.com/deskto-web
