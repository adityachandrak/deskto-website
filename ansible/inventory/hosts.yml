# Ansible inventory file (generated from Terraform output)
# Run: terraform output -json ansible_inventory | jq -r . > ansible/inventory/hosts.yml
---
all:
  children:
    webservers:
      hosts:
        web:
          ansible_host: "{{ ec2_public_ip }}"
          ansible_user: ec2-user
          ansible_connection: ssm
          ansible_ssh_common_args: "-o StrictHostKeyChecking=no"
