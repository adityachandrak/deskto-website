name: Legacy Backend CI/CD

on:
  workflow_dispatch:

permissions:
  id-token: write
  contents: read

env:
  AWS_REGION: ap-south-1
  ECR_REPOSITORY: deskto-backend

concurrency:
  group: backend-cicd-${{ github.ref }}
  cancel-in-progress: true

jobs:
  validate:
    name: Validate and build
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install frontend dependencies
        run: npm ci

      - name: Run lint
        run: npm run lint

      - name: Run frontend build
        run: npm run build

      - name: Run validation/test scripts
        run: npm run test

      - name: Install backend dependencies
        run: npm --prefix backend ci

      - name: Build backend TypeScript
        run: npm --prefix backend run build

      - name: Build backend Docker image (test)
        run: docker build -f backend/Dockerfile -t deskto-backend:test backend

      - name: Optional npm audit
        run: npm audit --omit=dev || true

      - name: Optional Trivy scan
        continue-on-error: true
        run: |
          docker run --rm -v /var/run/docker.sock:/var/run/docker.sock \
            aquasecurity/trivy:0.53.0 image --severity HIGH,CRITICAL --exit-code 0 deskto-backend:test

  publish-image:
    name: Publish backend image
    runs-on: ubuntu-latest
    needs: validate
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Configure AWS credentials via OIDC
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to Amazon ECR
        id: ecr-login
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build and push backend image
        run: |
          IMAGE_TAG=sha-${GITHUB_SHA::7}
          IMAGE_URI=${{ steps.ecr-login.outputs.registry }}/${{ env.ECR_REPOSITORY }}
          docker build -f backend/Dockerfile -t "$IMAGE_URI:$IMAGE_TAG" -t "$IMAGE_URI:latest" backend
          docker push "$IMAGE_URI:$IMAGE_TAG"
          docker push "$IMAGE_URI:latest"

  deploy:
    name: Deploy with Ansible
    runs-on: ubuntu-latest
    needs: publish-image
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install Ansible
        run: |
          sudo apt-get update
          sudo apt-get install -y ansible

      - name: Validate Ansible playbook syntax
        run: ansible-playbook --syntax-check ansible/playbooks/deploy.yml

      - name: Configure AWS credentials via OIDC
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Smoke test target endpoints
        run: |
          chmod +x scripts/smoke-test.sh
          ./scripts/smoke-test.sh http://127.0.0.1:3001

  notify:
    name: Notify result
    runs-on: ubuntu-latest
    needs: [validate, publish-image, deploy]
    if: always()

    steps:
      - name: Summarize workflow result
        run: |
          echo "Validate: ${{ needs.validate.result }}"
          echo "Publish image: ${{ needs.publish-image.result }}"
          echo "Deploy: ${{ needs.deploy.result }}"
