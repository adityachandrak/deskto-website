name: Production CI/CD

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  id-token: write
  contents: read

concurrency:
  group: production-deploy
  cancel-in-progress: false

env:
  AWS_REGION: ${{ secrets.AWS_REGION }}

jobs:
  validate:
    name: Validate Application
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: |
            package-lock.json
            backend/package-lock.json

      - name: Install frontend dependencies
        run: npm ci

      - name: Lint frontend workflow scripts
        run: npm run lint

      - name: Run frontend validation tests
        run: npm run test

      - name: Build frontend
        run: npm run build

      - name: Install backend dependencies
        run: npm --prefix backend ci

      - name: Build backend
        run: npm --prefix backend run build

      - name: Validate backend Docker image build
        run: docker build -f backend/Dockerfile -t deskto-backend:ci backend

      - name: Validate frontend Docker image build
        run: docker build -t deskto-web:ci .

  build-and-push:
    name: Build And Push Images
    runs-on: ubuntu-latest
    needs: validate

    outputs:
      backend_image: ${{ steps.images.outputs.backend_image }}
      frontend_image: ${{ steps.images.outputs.frontend_image }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login To ECR
        id: ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build And Push Docker Images
        id: images
        run: |
          IMAGE_TAG=sha-${GITHUB_SHA::7}
          REGISTRY=${{ steps.ecr.outputs.registry }}

          BACKEND_IMAGE=$REGISTRY/${{ secrets.BACKEND_ECR_REPOSITORY }}:$IMAGE_TAG
          FRONTEND_IMAGE=$REGISTRY/${{ secrets.FRONTEND_ECR_REPOSITORY }}:$IMAGE_TAG

          docker build -f backend/Dockerfile -t "$BACKEND_IMAGE" backend
          docker build -t "$FRONTEND_IMAGE" .

          docker push "$BACKEND_IMAGE"
          docker push "$FRONTEND_IMAGE"

          docker tag "$BACKEND_IMAGE" "$REGISTRY/${{ secrets.BACKEND_ECR_REPOSITORY }}:latest"
          docker tag "$FRONTEND_IMAGE" "$REGISTRY/${{ secrets.FRONTEND_ECR_REPOSITORY }}:latest"

          docker push "$REGISTRY/${{ secrets.BACKEND_ECR_REPOSITORY }}:latest"
          docker push "$REGISTRY/${{ secrets.FRONTEND_ECR_REPOSITORY }}:latest"

          echo "backend_image=$BACKEND_IMAGE" >> "$GITHUB_OUTPUT"
          echo "frontend_image=$FRONTEND_IMAGE" >> "$GITHUB_OUTPUT"

  deploy:
    name: Deploy To EC2
    runs-on: ubuntu-latest
    needs: build-and-push

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Send Deploy Command Through SSM
        id: deploy
        env:
          BACKEND_IMAGE: ${{ needs.build-and-push.outputs.backend_image }}
          FRONTEND_IMAGE: ${{ needs.build-and-push.outputs.frontend_image }}
          WEBSITE_URL: ${{ secrets.WEBSITE_URL }}
        run: |
          DEPLOY_SCRIPT_B64="$(base64 -w0 scripts/production-ec2-deploy.sh)"
          export DEPLOY_SCRIPT_B64

          node <<'NODE'
          const fs = require('fs');

          const shellQuote = (value) => `'${String(value).replace(/'/g, `'\\''`)}'`;
          const commands = [
            `cat > /tmp/deskto-production-ec2-deploy.b64 <<'DEPLOY_SCRIPT_B64'\n${process.env.DEPLOY_SCRIPT_B64}\nDEPLOY_SCRIPT_B64`,
            'base64 -d /tmp/deskto-production-ec2-deploy.b64 > /tmp/deskto-production-ec2-deploy.sh',
            'chmod +x /tmp/deskto-production-ec2-deploy.sh',
            [
              `AWS_REGION=${shellQuote(process.env.AWS_REGION)}`,
              `BACKEND_IMAGE=${shellQuote(process.env.BACKEND_IMAGE)}`,
              `FRONTEND_IMAGE=${shellQuote(process.env.FRONTEND_IMAGE)}`,
              `WEBSITE_URL=${shellQuote(process.env.WEBSITE_URL)}`,
              'bash /tmp/deskto-production-ec2-deploy.sh',
            ].join(' '),
          ];

          fs.writeFileSync('ssm-parameters.json', JSON.stringify({ commands }, null, 2));
          NODE

          COMMAND_ID=$(aws ssm send-command \
            --region "$AWS_REGION" \
            --instance-ids "${{ secrets.EC2_INSTANCE_ID }}" \
            --document-name "AWS-RunShellScript" \
            --comment "DESKTO production deploy ${GITHUB_SHA}" \
            --parameters file://ssm-parameters.json \
            --query "Command.CommandId" \
            --output text)

          echo "command_id=$COMMAND_ID" >> "$GITHUB_OUTPUT"

      - name: Wait For Deploy Result
        run: |
          COMMAND_ID=${{ steps.deploy.outputs.command_id }}

          for i in {1..90}; do
            STATUS=$(aws ssm get-command-invocation \
              --region "$AWS_REGION" \
              --command-id "$COMMAND_ID" \
              --instance-id "${{ secrets.EC2_INSTANCE_ID }}" \
              --query Status \
              --output text 2>/dev/null || echo "Pending")

            echo "Deploy status: $STATUS"

            if [ "$STATUS" = "Success" ]; then
              aws ssm get-command-invocation \
                --region "$AWS_REGION" \
                --command-id "$COMMAND_ID" \
                --instance-id "${{ secrets.EC2_INSTANCE_ID }}" \
                --query StandardOutputContent \
                --output text
              exit 0
            fi

            if [ "$STATUS" = "Failed" ] || [ "$STATUS" = "Cancelled" ] || [ "$STATUS" = "TimedOut" ]; then
              echo "Deployment failed"
              aws ssm get-command-invocation \
                --region "$AWS_REGION" \
                --command-id "$COMMAND_ID" \
                --instance-id "${{ secrets.EC2_INSTANCE_ID }}" \
                --query StandardOutputContent \
                --output text || true
              aws ssm get-command-invocation \
                --region "$AWS_REGION" \
                --command-id "$COMMAND_ID" \
                --instance-id "${{ secrets.EC2_INSTANCE_ID }}" \
                --query StandardErrorContent \
                --output text || true
              exit 1
            fi

            sleep 5
          done

          echo "Deploy timed out"
          exit 1

  invalidate-cloudfront:
    name: Invalidate CloudFront
    runs-on: ubuntu-latest
    needs: deploy

    steps:
      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Invalidate Website CloudFront
        run: |
          INVALIDATION_ID=$(aws cloudfront create-invalidation \
            --distribution-id "${{ secrets.FRONTEND_CLOUDFRONT_DISTRIBUTION_ID }}" \
            --paths "/*" \
            --query "Invalidation.Id" \
            --output text)

          aws cloudfront wait invalidation-completed \
            --distribution-id "${{ secrets.FRONTEND_CLOUDFRONT_DISTRIBUTION_ID }}" \
            --id "$INVALIDATION_ID"

          echo "CloudFront invalidation completed: $INVALIDATION_ID"

  smoke-test:
    name: Production Smoke Test
    runs-on: ubuntu-latest
    needs: invalidate-cloudfront

    steps:
      - name: Test Website
        run: |
          curl -fsSI "${{ secrets.WEBSITE_URL }}"
          curl -fsS "${{ secrets.WEBSITE_URL }}" | grep -i "<html"

      - name: Test Backend Health
        run: curl -fsS "${{ secrets.BACKEND_HEALTH_URL }}"

      - name: Test Public Products API
        run: curl -fsS "${{ secrets.WEBSITE_URL }}/api/products?limit=5"

      - name: Test Product Page Route
        run: curl -fsSI "${{ secrets.WEBSITE_URL }}/products"
